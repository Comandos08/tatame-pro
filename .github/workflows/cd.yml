name: CD — Deploy

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    # The native Vercel GitHub integration handles preview deployments automatically.
    # This CI-driven job is an optional alternative that only runs when the
    # repository variable VERCEL_DEPLOY_ENABLED is set to 'true'.
    # To enable: Settings → Variables → New repository variable → VERCEL_DEPLOY_ENABLED=true
    # and add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID as repository secrets.
    if: github.event_name == 'pull_request' && vars.VERCEL_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.VERCEL_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod

      - name: Notify deploy success
        if: success()
        run: echo "::notice::Production deploy successful — $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Notify deploy failure
        if: failure()
        run: echo "::error::Production deploy FAILED — check logs"
