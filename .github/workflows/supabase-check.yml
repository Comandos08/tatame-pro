name: Supabase — Governance Check

on:
  pull_request:
    paths:
      - 'supabase/**'

jobs:
  supabase-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate SQL — No DROP TABLE
        run: |
          echo "🔍 Checking for DROP TABLE in migrations added after SAFE GOLD governance..."
          # Only check migrations from 20260316 onwards (governance introduced then).
          # Historical migrations before that date pre-date these rules.
          FAILED=0
          for f in supabase/migrations/*.sql; do
            ts=$(basename "$f" | cut -c1-14)
            [ "$ts" -ge "20260316000000" ] || continue
            if grep -qn "DROP TABLE" "$f"; then
              echo "❌ DROP TABLE found in $f (post-governance migration)"
              grep -n "DROP TABLE" "$f"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "✅ No DROP TABLE in post-governance migrations"

      - name: Validate SQL — No TRUNCATE
        run: |
          echo "🔍 Checking for TRUNCATE in migrations added after SAFE GOLD governance..."
          # Only check migrations from 20260316 onwards (governance introduced then).
          # Historical migrations before that date pre-date these rules.
          FAILED=0
          for f in supabase/migrations/*.sql; do
            ts=$(basename "$f" | cut -c1-14)
            [ "$ts" -ge "20260316000000" ] || continue
            if grep -qn "TRUNCATE" "$f"; then
              echo "❌ TRUNCATE found in $f (post-governance migration)"
              grep -n "TRUNCATE" "$f"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "✅ No TRUNCATE in post-governance migrations"

      - name: Validate Edge Functions — No Date.now()
        # Advisory: pre-existing violations in legacy functions are known and tracked.
        # New edge functions must not use Date.now(). Legacy functions will be
        # migrated incrementally. This check reports violations but does not block.
        continue-on-error: true
        run: |
          echo "🔍 Checking for Date.now() in Edge Functions (advisory)..."
          FOUND=$(grep -rn "Date\.now()" supabase/functions --include="*.ts" 2>/dev/null \
            | grep -Ev "_shared/|_tests/" || true)
          if [ -n "$FOUND" ]; then
            echo "⚠️ Date.now() encontrado (legado — migrar para NOW() no DB ou timestamps explícitos):"
            echo "$FOUND"
          else
            echo "✅ No Date.now() found"
          fi

      - name: Validate Edge Functions — No unsafe new Date()
        # Advisory: pre-existing violations in legacy functions are known and tracked.
        # New edge functions must use explicit ISO date strings. This check reports
        # violations but does not block to allow incremental migration.
        continue-on-error: true
        run: |
          echo "🔍 Checking for unsafe new Date() usage (advisory)..."
          FOUND=$(grep -rn "new Date(" supabase/functions --include="*.ts" 2>/dev/null \
            | grep -Ev "new Date\(['\"][0-9]{4}-[0-9]{2}-[0-9]{2}T" \
            | grep -Ev "_shared/|_tests/" || true)
          if [ -n "$FOUND" ]; then
            echo "⚠️ Unsafe new Date() encontrado (legado — use new Date('YYYY-MM-DDTHH:mm:ssZ')):"
            echo "$FOUND"
          else
            echo "✅ Deterministic Date usage enforced"
          fi

      - name: Validate config.toml exists
        run: |
          echo "🔍 Checking for Supabase config..."
          if [ ! -f "supabase/config.toml" ]; then
            echo "❌ supabase/config.toml not found"
            exit 1
          fi
          echo "✅ config.toml found"

      - name: G1 — No raw console.* in Edge Functions
        run: |
          echo "🔍 G1: Checking for raw console.* usage..."
          # Exclude _shared/, _tests/, and test files
          if grep -rn 'console\.\(log\|error\|warn\|info\)' supabase/functions --include="*.ts" \
            | grep -Ev '_tests/|\.test\.ts|_shared/'; then
            echo "❌ FAIL: Raw console.* found outside _shared/ and _tests/"
            echo "📝 Use createBackendLogger from _shared/backend-logger.ts"
            exit 1
          fi
          echo "✅ G1 passed"

      - name: G2 — No ad-hoc error responses
        run: |
          echo "🔍 G2: Checking for ad-hoc { error } responses..."
          if grep -rn 'JSON\.stringify({[[:space:]]*error:' supabase/functions --include="*.ts" \
            | grep -Ev "_tests/|\.test\.ts|_shared/"; then
            echo "❌ FAIL: Ad-hoc { error } response found"
            exit 1
          fi
          echo "✅ G2 passed"

      - name: G3 — All functions must use envelope helpers
        run: |
          echo "🔍 G3: Checking envelope usage in all Edge Functions..."
          FAILED=0
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            [[ "$fn" == _* ]] && continue
            if ! grep -q "okResponse\|errorResponse" "$dir/index.ts" 2>/dev/null; then
              echo "❌ FAIL: $fn does not use envelope helpers"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "✅ G3 passed"

      - name: G4 — All functions must use backend-logger
        run: |
          echo "🔍 G4: Checking backend-logger usage in all Edge Functions..."
          FAILED=0
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            [[ "$fn" == _* ]] && continue
            if ! grep -q "backend-logger" "$dir/index.ts" 2>/dev/null; then
              echo "❌ FAIL: $fn does not import backend-logger"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "✅ G4 passed"

      - name: G5 — Billing transitions must use assertValidBillingTransition
        run: |
          echo "🔍 G5: Checking billing state machine enforcement..."
          WEBHOOK="supabase/functions/stripe-webhook/index.ts"
          FAILED=0

          # Must import billing-state-machine
          if ! grep -q "billing-state-machine" "$WEBHOOK"; then
            echo "❌ FAIL: stripe-webhook does not import billing-state-machine"
            FAILED=1
          fi

          # Must call assertValidBillingTransition
          if ! grep -q "assertValidBillingTransition" "$WEBHOOK"; then
            echo "❌ FAIL: stripe-webhook does not call assertValidBillingTransition"
            FAILED=1
          fi

          # Must call deriveTenantActive
          if ! grep -q "deriveTenantActive" "$WEBHOOK"; then
            echo "❌ FAIL: stripe-webhook does not call deriveTenantActive"
            FAILED=1
          fi

          # Must appear in both handlers (handleSubscriptionChange + handleSubscriptionDeleted)
          CHANGE_COUNT=$(grep -c "assertValidBillingTransition" "$WEBHOOK" || true)
          if [ "$CHANGE_COUNT" -lt 2 ]; then
            echo "❌ FAIL: assertValidBillingTransition must be called in both handlers (found $CHANGE_COUNT)"
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "✅ G5 passed"

      - name: G6 — Tenant boundary guard exists and exports required functions
        run: |
          echo "🔍 G6: Checking tenant boundary enforcement..."
          BOUNDARY="supabase/functions/_shared/tenant-boundary.ts"
          FAILED=0

          if [ ! -f "$BOUNDARY" ]; then
            echo "❌ FAIL: tenant-boundary.ts not found"
            FAILED=1
          fi

          if ! grep -q "assertTenantAccess" "$BOUNDARY"; then
            echo "❌ FAIL: assertTenantAccess not exported"
            FAILED=1
          fi

          if ! grep -q "assertTenantMatchesImpersonation" "$BOUNDARY"; then
            echo "❌ FAIL: assertTenantMatchesImpersonation not exported"
            FAILED=1
          fi

          if ! grep -q "TenantBoundaryError" "$BOUNDARY"; then
            echo "❌ FAIL: TenantBoundaryError class not defined"
            FAILED=1
          fi

          # Verify adoption in key functions (WARN only — incremental adoption)
          for fn in start-impersonation validate-impersonation stripe-webhook; do
            FN_FILE="supabase/functions/$fn/index.ts"
            if [ -f "$FN_FILE" ] && ! grep -q "tenant-boundary\|assertTenantAccess" "$FN_FILE"; then
              echo "⚠️ WARN: $fn does not use tenant-boundary (incremental adoption)"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "✅ G6 passed"

      - name: G7 — Logger + correlationId mandatory for Tier 1 functions
        run: |
          echo "🔍 G7: Checking structured logging in Tier 1 functions..."
          TIER1_FNS="resolve-identity-wizard grant-roles revoke-roles approve-membership reject-membership admin-billing-control"
          FAILED=0

          for fn in $TIER1_FNS; do
            FN_FILE="supabase/functions/$fn/index.ts"
            if [ ! -f "$FN_FILE" ]; then
              echo "❌ FAIL: $fn/index.ts not found"
              FAILED=1
              continue
            fi

            if ! grep -q "createBackendLogger" "$FN_FILE"; then
              echo "❌ FAIL: $fn does not use createBackendLogger"
              FAILED=1
            fi

            if ! grep -q "extractCorrelationId" "$FN_FILE"; then
              echo "❌ FAIL: $fn does not use extractCorrelationId"
              FAILED=1
            fi

            if ! grep -q "correlationId" "$FN_FILE"; then
              echo "❌ FAIL: $fn does not reference correlationId"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "✅ G7 passed"

      - name: G8 — A07 envelope adoption for Tier 1 functions
        run: |
          echo "🔍 G8: Checking A07 envelope in Tier 1 functions..."
          TIER1_FNS="resolve-identity-wizard grant-roles revoke-roles approve-membership reject-membership admin-billing-control"
          FAILED=0

          for fn in $TIER1_FNS; do
            FN_FILE="supabase/functions/$fn/index.ts"
            if [ ! -f "$FN_FILE" ]; then
              echo "❌ FAIL: $fn/index.ts not found"
              FAILED=1
              continue
            fi

            if ! grep -q "okResponse\|errorResponse" "$FN_FILE"; then
              echo "❌ FAIL: $fn does not use okResponse or errorResponse"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "✅ G8 passed"

      - name: Summary
        run: |
          echo "✅ Supabase Governance Check PASSED"
          echo "📋 SAFE GOLD compliance verified"
          echo "🛡️ Gates G1-G8 enforced"
