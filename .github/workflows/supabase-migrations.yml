name: Supabase — Apply Migrations

# Aplica migrations automaticamente em produção quando há push na main
# com alterações em supabase/migrations/
#
# SECRETS necessários (GitHub → Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN   → token da conta em supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD    → senha do banco (Settings → Database → Connection string)
#
# O project_id é lido do supabase/config.toml automaticamente.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

concurrency:
  group: supabase-migrations
  cancel-in-progress: false  # Nunca cancelar migrations em progresso

jobs:
  apply-migrations:
    name: Apply DB Migrations → Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref kotxhtveuegrywzyvdnl
          supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Confirm migrations applied
        if: success()
        run: echo "::notice::✅ Migrations aplicadas em produção — $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Alert on failure
        if: failure()
        run: echo "::error::❌ Falha ao aplicar migrations — verifique os logs imediatamente"
