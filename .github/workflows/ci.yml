name: CI — SAFE GOLD

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        # Dependency tree is clean (0 vulns as of 2026-04-20 after picomatch +
        # brace-expansion bumps). Block on high so regressions surface in CI.
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: i18n validation
        run: npm run i18n:check

      - name: Unit tests
        run: npx vitest run

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: E2E tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://kotxhtveuegrywzyvdnl.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvdHhodHZldWVncnl3enl2ZG5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0OTIzMzgsImV4cCI6MjA4NDA2ODMzOH0.xYk_yN_H35ldnzrtnkqNRcqqPQSB54rR0uvi_RHihg0' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvdHhodHZldWVncnl3enl2ZG5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0OTIzMzgsImV4cCI6MjA4NDA2ODMzOH0.xYk_yN_H35ldnzrtnkqNRcqqPQSB54rR0uvi_RHihg0' }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'kotxhtveuegrywzyvdnl' }}
          VITE_APP_URL: http://127.0.0.1:5173
          VITE_SENTRY_DSN: ''
          CI: true
        run: npx playwright test --project=ci

      - name: Build
        env:
          # Same fallbacks as the E2E step above. The anon key is a public,
          # JWT-signed publishable key — safe to commit (it appears verbatim
          # in every browser request anyway). Hard-coding the fallback keeps
          # CI green for forks/PRs that don't have the org secrets set, while
          # still letting org maintainers override via repo secrets.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://kotxhtveuegrywzyvdnl.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvdHhodHZldWVncnl3enl2ZG5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0OTIzMzgsImV4cCI6MjA4NDA2ODMzOH0.xYk_yN_H35ldnzrtnkqNRcqqPQSB54rR0uvi_RHihg0' }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'kotxhtveuegrywzyvdnl' }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL || 'https://tatame.pro' }}
        run: npm run build

      - name: Verify build env
        # Confirms VITE_SUPABASE_* were actually baked into dist/. Catches the
        # silent failure where Vite substitutes `undefined` literals when env
        # vars are missing at build time. See scripts/verify-build-env.mjs for
        # the three checks performed.
        run: node scripts/verify-build-env.mjs
