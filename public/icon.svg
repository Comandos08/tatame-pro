<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Tatame Pro">
  <title>Tatame Pro</title>
  <!--
    Maskable-safe icon — visual content stays inside the inner 80% safe
    zone (rect 51,51 to 461,461) so PWA installers cropping for round /
    squircle masks never clip the monogram. Background fills the full
    512x512 bleed; foreground sits centered.
  -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <g transform="translate(0, -4)">
    <!-- Horizontal bar of the T -->
    <rect x="128" y="160" width="256" height="48" rx="8" fill="#dc2626"/>
    <!-- Vertical stem of the T -->
    <rect x="232" y="160" width="48" height="208" rx="8" fill="#dc2626"/>
    <!-- Bottom accent -->
    <rect x="208" y="360" width="96" height="8" rx="4" fill="#dc2626" opacity="0.5"/>
  </g>
</svg>
