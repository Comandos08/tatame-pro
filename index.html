<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tatame Pro - Combat Sports Management</title>
    <meta
      name="description"
      content="Multi-tenant SaaS platform for combat sports federations and organizations. Manage athletes, academies, gradings and memberships."
    />
    <meta name="author" content="TATAME" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="%VITE_APP_URL%/og-image.png"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@TatamePro" />
    <meta
      name="twitter:image"
      content="%VITE_APP_URL%/og-image.png"
    />
    <meta property="og:title" content="Tatame Pro - Combat Sports Management" />
    <meta name="twitter:title" content="Tatame Pro - Combat Sports Management" />
    <meta
      property="og:description"
      content="Multi-tenant SaaS platform for combat sports federations and organizations. Manage athletes, academies, gradings and memberships."
    />
    <meta
      name="twitter:description"
      content="Multi-tenant SaaS platform for combat sports federations and organizations. Manage athletes, academies, gradings and memberships."
    />

    <!-- Security: Content Security Policy -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://browser.sentry-cdn.com https://js.stripe.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob: https://*.supabase.co https://*.stripe.com;
        connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://*.sentry.io https://browser.sentry-cdn.com;
        frame-src https://js.stripe.com https://*.supabase.co;
        object-src 'none';
        base-uri 'self';
      "
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta
      http-equiv="Referrer-Policy"
      content="strict-origin-when-cross-origin"
    />

    <!-- Sentry Browser SDK — load only when VITE_SENTRY_DSN is defined -->
    <script>
      (function () {
        var dsn = "%VITE_SENTRY_DSN%";
        if (dsn && dsn !== "" && dsn !== "%VITE_SENTRY_DSN%") {
          window.__SENTRY_DSN__ = dsn;

          var s = document.createElement("script");
          s.src = "https://browser.sentry-cdn.com/7.119.0/bundle.min.js";
          s.crossOrigin = "anonymous";
          s.setAttribute("data-lazy", "true");
          document.head.appendChild(s);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
