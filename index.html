<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="color-scheme" content="light dark" />
    <title>Tatame Pro — Gestão Completa para Federações e Academias de Artes Marciais</title>
    <meta
      name="description"
      content="Plataforma SaaS para federações, academias e organizações de Jiu-Jitsu e artes marciais. Gestão de atletas, filiações, graduações, eventos e credenciais digitais com conformidade LGPD."
    />
    <meta name="author" content="TATAME" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="44x43" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Both forms: apple-mobile-web-app-capable is legacy iOS, mobile-web-app-capable is the standardized form Chrome 32+ expects -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tatame Pro" />
    <link rel="canonical" href="https://tatame.pro/" />
    <link rel="alternate" hreflang="pt-BR" href="https://tatame.pro/" />
    <link rel="alternate" hreflang="en" href="https://tatame.pro/?lang=en" />
    <link rel="alternate" hreflang="es" href="https://tatame.pro/?lang=es" />
    <link rel="alternate" hreflang="x-default" href="https://tatame.pro/" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:site_name" content="Tatame Pro" />
    <meta property="og:url" content="https://tatame.pro/" />
    <meta
      property="og:image"
      content="https://tatame.pro/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Tatame Pro — Gestão de Artes Marciais" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@TatamePro" />
    <meta
      name="twitter:image"
      content="https://tatame.pro/og-image.png"
    />
    <meta property="og:title" content="Tatame Pro — Gestão Completa para Federações e Academias" />
    <meta name="twitter:title" content="Tatame Pro — Gestão Completa para Federações e Academias" />
    <meta
      property="og:description"
      content="Plataforma SaaS para federações, academias e organizações de Jiu-Jitsu e artes marciais. Gestão de atletas, filiações, graduações, eventos e credenciais digitais."
    />
    <meta
      name="twitter:description"
      content="Plataforma SaaS para federações, academias e organizações de Jiu-Jitsu e artes marciais. Gestão de atletas, filiações, graduações, eventos e credenciais digitais."
    />

    <!-- Security: Content Security Policy is served as an HTTP header from vercel.json -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta
      http-equiv="Referrer-Policy"
      content="strict-origin-when-cross-origin"
    />

    <!-- Structured data: Organization + SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://tatame.pro/#organization",
          "name": "Tatame Pro",
          "url": "https://tatame.pro/",
          "logo": "https://tatame.pro/favicon.png",
          "sameAs": [
            "https://twitter.com/TatamePro"
          ],
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "suporte@tatame.pro",
            "contactType": "customer support",
            "areaServed": "BR",
            "availableLanguage": ["Portuguese", "English", "Spanish"]
          }
        },
        {
          "@type": "SoftwareApplication",
          "name": "Tatame Pro",
          "operatingSystem": "Web",
          "applicationCategory": "BusinessApplication",
          "description": "Plataforma SaaS para gestão de federações, academias e organizações de artes marciais.",
          "url": "https://tatame.pro/",
          "publisher": { "@id": "https://tatame.pro/#organization" },
          "offers": {
            "@type": "Offer",
            "priceCurrency": "BRL",
            "availability": "https://schema.org/InStock"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://tatame.pro/#website",
          "url": "https://tatame.pro/",
          "name": "Tatame Pro",
          "inLanguage": "pt-BR",
          "publisher": { "@id": "https://tatame.pro/#organization" }
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
