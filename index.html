  <!-- Security: Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://browser.sentry-cdn.com https://js.stripe.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: blob: https://*.supabase.co https://*.stripe.com;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://*.sentry.io;
    frame-src https://js.stripe.com https://*.supabase.co;
    object-src 'none';
    base-uri 'self';
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

  <!-- Sentry Browser SDK — loaded only when VITE_SENTRY_DSN is defined at build time -->
  <script>
    (function() {
      var dsn = '%VITE_SENTRY_DSN%';
      if (dsn && dsn !== '' && dsn !== '%VITE_SENTRY_DSN%') {
        window.__SENTRY_DSN__ = dsn;
      }
    })();
  </script>
  <script
    src="https://browser.sentry-cdn.com/7.119.0/bundle.min.js"
    crossorigin="anonymous"
    data-lazy="true"
  ></script>
